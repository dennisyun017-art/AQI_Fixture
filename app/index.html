<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AQI System — PSK Holdings</title>
  <style>
    /*
============================================
파일명  : 20260424_AQI_Dashboard_v1.0.html
작성일  : 2026-04-24
작성자  : Dennis
버전    : v1.0
--------------------------------------------
개정이력
v1.0  2026-04-24  최초 작성 (대시보드 메인)
============================================
*/

    /* ===== 설정 영역 ===== */
    :root {
      --primary: #1A3A5C;
      --accent: #E8A020;
      --bg: #0F1923;
      --surface: #1A2535;
      --surface2: #243042;
      --text: #E8EDF3;
      --text-sub: #7A8FA6;
      --border: rgba(255, 255, 255, 0.08);
      --radius: 14px;
    }

    /* ==================== */

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 배경 격자 패턴 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(26, 58, 92, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26, 58, 92, 0.15) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── 헤더 ── */
    .header {
      position: relative;
      z-index: 10;
      padding: 32px 40px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-brand {}

    .header-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .header-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .header-title span {
      color: var(--accent);
    }

    .header-meta {
      text-align: right;
    }

    .header-date {
      font-size: 12px;
      color: var(--text-sub);
      margin-bottom: 4px;
    }

    .header-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #4CAF82;
      background: rgba(76, 175, 130, 0.12);
      border: 1px solid rgba(76, 175, 130, 0.25);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .header-status::before {
      content: '';
      width: 6px;
      height: 6px;
      background: #4CAF82;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* ── 구분선 ── */
    .divider {
      position: relative;
      z-index: 10;
      margin: 24px 40px;
      height: 1px;
      background: var(--border);
    }

    .divider::after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 80px;
      height: 2px;
      background: var(--accent);
      margin-top: -0.5px;
    }

    /* ── 메뉴 그리드 ── */
    .menu-section {
      position: relative;
      z-index: 10;
      padding: 0 40px 60px;
    }

    .menu-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 20px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    /* ── 메뉴 카드 ── */
    .menu-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      overflow: hidden;
      text-decoration: none;
      display: block;
    }

    .menu-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--card-color, var(--accent));
      border-radius: var(--radius) 0 0 var(--radius);
    }

    .menu-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top left, var(--card-color-faint, rgba(232, 160, 32, 0.05)), transparent 60%);
      pointer-events: none;
    }

    .menu-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .menu-card.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .card-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
    }

    .card-label {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text-sub);
      line-height: 1.5;
    }

    .card-arrow {
      position: absolute;
      right: 20px;
      bottom: 24px;
      font-size: 18px;
      color: var(--text-sub);
      transition: transform 0.2s, color 0.2s;
    }

    .menu-card:hover .card-arrow {
      transform: translateX(4px);
      color: var(--card-color, var(--accent));
    }

    .card-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-sub);
      text-transform: uppercase;
    }

    /* ── 로딩 화면 ── */
    .loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 16px;
      transition: opacity 0.4s;
    }

    .loading.hide {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      font-size: 13px;
      color: var(--text-sub);
      letter-spacing: 1px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── 에러 메시지 ── */
    .error-notice {
      position: relative;
      z-index: 10;
      margin: 0 40px 20px;
      padding: 12px 16px;
      background: rgba(192, 57, 43, 0.12);
      border: 1px solid rgba(192, 57, 43, 0.3);
      border-radius: 8px;
      font-size: 12px;
      color: #E57373;
      display: none;
    }

    .error-notice.show {
      display: block;
    }

    /* ── 하단 정보 ── */
    .footer {
      position: relative;
      z-index: 10;
      padding: 0 40px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .footer-info {
      font-size: 11px;
      color: var(--text-sub);
    }

    .footer-version {
      font-size: 11px;
      color: var(--text-sub);
      font-family: 'Courier New', monospace;
    }

    /* ── 카드 진입 애니메이션 ── */
    .menu-card {
      opacity: 0;
      transform: translateY(20px);
      animation: cardIn 0.4s ease forwards;
    }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .header {
        padding: 24px 20px 0;
      }

      .divider {
        margin: 20px 20px;
      }

      .menu-section {
        padding: 0 20px 40px;
      }

      .menu-grid {
        grid-template-columns: 1fr;
      }

      .footer {
        padding: 0 20px 24px;
      }

      .header-meta {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- 로딩 -->
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">시스템 불러오는 중...</div>
  </div>

  <!-- 헤더 -->
  <header class="header">
    <div class="header-brand">
      <div class="header-eyebrow">PSK Holdings — 제조부문</div>
      <h1 class="header-title" id="headerTitle">AQI <span>System</span></h1>
    </div>
    <div class="header-meta">
      <div class="header-date" id="headerDate"></div>
      <div class="header-status">시스템 정상</div>
    </div>
  </header>

  <div class="divider"></div>

  <!-- 에러 -->
  <div class="error-notice" id="errorNotice"></div>

  <!-- 메뉴 -->
  <section class="menu-section">
    <div class="menu-label">메뉴 선택</div>
    <div class="menu-grid" id="menuGrid">
      <!-- dashboard.json 에서 동적 생성 -->
    </div>
  </section>

  <!-- 푸터 -->
  <footer class="footer">
    <div class="footer-info" id="footerInfo">AQI System</div>
    <div class="footer-version">v1.0 · 2026-04-24</div>
  </footer>

  <script>
    /* ===== 설정 영역 ===== */
    const CONFIG = {
      DASHBOARD_JSON: '../config/dashboard.json',
    };
    /* ==================== */

    // 화면별 URL 매핑 (id → 이동할 URL 또는 파일명)
    // 화면이 추가되면 여기에만 추가
    const SCREEN_MAP = {
      defect: 'issue.html',        // 외관 불량 실패 사례
      standard: 'standard.html',     // 작업표준서 (추후 개발)
      torque: 'torque.html',       // Torque Check (추후 개발)
      leak: 'leak.html',         // Leak Check (추후 개발)
    };

    // 날짜 표시
    function setDate() {
      const now = new Date();
      const opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
      document.getElementById('headerDate').textContent =
        now.toLocaleDateString('ko-KR', opts);
    }

    // dashboard.json 로드 → 카드 생성
    async function loadDashboard() {
      try {
        const res = await fetch(CONFIG.DASHBOARD_JSON);
        if (!res.ok) throw new Error('dashboard.json 로드 실패');
        const data = await res.json();

        // 헤더 타이틀 업데이트
        if (data.title) {
          const parts = data.title.split(' ');
          document.getElementById('headerTitle').innerHTML =
            parts.length > 1
              ? parts[0] + ' <span>' + parts.slice(1).join(' ') + '</span>'
              : data.title;
        }
        document.getElementById('footerInfo').textContent =
          (data.subtitle || '') + ' · ' + (data.title || 'AQI System');

        buildCards(data.menus || []);
      } catch (e) {
        console.warn('dashboard.json 로드 실패, 기본 메뉴 사용:', e);
        showError('⚠️ dashboard.json을 불러오지 못했습니다. 기본 메뉴를 표시합니다.');
        buildCards(DEFAULT_MENUS);
      } finally {
        // 로딩 숨기기
        setTimeout(() => {
          document.getElementById('loading').classList.add('hide');
        }, 400);
      }
    }

    // 기본 메뉴 (dashboard.json 없을 때 폴백)
    const DEFAULT_MENUS = [
      { id: 'defect', icon: '🔍', label: 'Issue DB', desc: '외관 불량 사례 조회 및 작업 전 체크리스트', color: '#C0392B', enabled: true },
      { id: 'standard', icon: '📋', label: '작업표준서 확인', desc: 'Critical Defect 공정 표준서', color: '#2980B9', enabled: true },
      { id: 'torque', icon: '🔧', label: 'Torque Check', desc: '토크 체결값 측정 및 기록', color: '#1A3A5C', enabled: true },
      { id: 'leak', icon: '💨', label: 'Leak Check', desc: 'Leak Check 값 측정 및 기록', color: '#1E8C45', enabled: true },
    ];

    // 카드 생성
    function buildCards(menus) {
      const grid = document.getElementById('menuGrid');
      grid.innerHTML = '';

      menus.forEach((m, i) => {
        const url = SCREEN_MAP[m.id] || '#';
        const isReady = !!SCREEN_MAP[m.id] && m.enabled;

        const card = document.createElement('a');
        card.href = isReady ? url : 'javascript:void(0)';
        card.className = 'menu-card' + (m.enabled ? '' : ' disabled');
        card.style.setProperty('--card-color', m.color || 'var(--accent)');
        card.style.setProperty('--card-color-faint', hexToFaint(m.color));
        card.style.animationDelay = (i * 0.08) + 's';

        card.innerHTML = `
      <span class="card-icon">${m.icon || '📄'}</span>
      <div class="card-label">${m.label}</div>
      <div class="card-desc">${m.desc || ''}</div>
      <span class="card-arrow">›</span>
    `;

        grid.appendChild(card);
      });
    }

    // hex 색상 → 반투명 (카드 배경 그라데이션용)
    function hexToFaint(hex) {
      if (!hex || !hex.startsWith('#')) return 'rgba(232,160,32,0.05)';
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},0.06)`;
    }

    function showError(msg) {
      const el = document.getElementById('errorNotice');
      el.textContent = msg;
      el.classList.add('show');
    }

    // 초기화
    setDate();
    loadDashboard();
  </script>
</body>

</html>
