<!DOCTYPE html>
<html lang="ko">
<head>
<!--
============================================
파일명  : dashboard.html
작성일  : 2026-05-08
작성자  : Dennis
버전    : v0.2.1
--------------------------------------------
개정이력
v0.1.0  2026-04-24  최초 작성
v0.2.0  2026-05-08  PSK 스타일 적용, 카드 6개(3+3), Visual Check / Automated Report 추가
v0.2.1  2026-05-08  상단 브랜드/시스템명 변경 및 dashboard.json 메타 정보 화면 반영
============================================
-->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AQI (Assembly Quality Inspection) System — PSK Group</title>
  <style>
    /* ===== 리셋 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== CSS 변수 ===== */
    :root {
      --purple:      #6B21A8;
      --purple-dark: #4C1D95;
      --purple-mid:  #7C3AED;
      --accent:      #C9951A;
      --bg:          #F4F6F9;
      --surface:     #FFFFFF;
      --border:      #E2E8F0;
      --text:        #1E293B;
      --text-sub:    #64748B;
      --radius:      14px;
      --shadow:      0 2px 12px rgba(0,0,0,0.07);
    }

    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-width: 900px;
    }

    /* ===== 상단 헤더 바 ===== */
    .top-bar {
      background: linear-gradient(135deg, var(--purple-dark) 0%, var(--purple) 60%, var(--purple-mid) 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 52px;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .top-bar-logo {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.5px;
      color: #fff;
      white-space: nowrap;
    }

    .top-bar-divider {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.35);
    }

    .top-bar-title {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.92);
      white-space: nowrap;
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
    }

    .top-bar-version {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.3);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }

    /* ===== 탭 네비 ===== */
    .tab-nav {
      background: var(--purple-dark);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      user-select: none;
    }

    .tab-item:hover {
      color: rgba(255,255,255,0.9);
    }

    .tab-item.active {
      color: #fff;
      border-bottom-color: #fff;
    }

    .tab-item .tab-icon {
      font-size: 14px;
    }

    /* ===== 본문 ===== */
    .main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 28px 28px 48px;
    }

    /* ===== 섹션 타이틀 ===== */
    .section-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 16px;
    }

    /* ===== 카드 그리드 3+3 ===== */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    /* ===== 메뉴 카드 ===== */
    .menu-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 22px 22px;
      cursor: pointer;
      text-decoration: none;
      display: block;
      box-shadow: var(--shadow);
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      overflow: hidden;
      opacity: 0;
      transform: translateY(16px);
      animation: cardIn 0.35s ease forwards;
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* 카드 상단 컬러 라인 */
    .menu-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--card-color, var(--purple));
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .menu-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 32px rgba(0,0,0,0.11);
      border-color: var(--card-color, var(--purple));
    }

    .menu-card.disabled {
      opacity: 0.55 !important;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* 카드 내부 */
    .card-icon {
      font-size: 30px;
      margin-bottom: 14px;
      display: block;
    }

    .card-label {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 7px;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 12.5px;
      color: var(--text-sub);
      line-height: 1.6;
      padding-right: 28px;
    }

    .card-arrow {
      position: absolute;
      right: 18px;
      bottom: 20px;
      font-size: 20px;
      color: #CBD5E1;
      transition: transform 0.18s, color 0.18s;
    }

    .menu-card:hover .card-arrow {
      transform: translateX(4px);
      color: var(--card-color, var(--purple));
    }

    /* 상태 배지 */
    .card-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 10.5px;
      font-weight: 800;
      padding: 3px 9px;
      border-radius: 999px;
    }

    .card-badge.ready {
      background: #E5F7EF;
      color: #087443;
      border: 1px solid #A9E8C8;
    }

    .card-badge.wait {
      background: #F1F5F9;
      color: #94A3B8;
      border: 1px solid #E2E8F0;
    }

    /* ===== 로딩 ===== */
    .loading {
      position: fixed;
      inset: 0;
      background: #F4F6F9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 14px;
      transition: opacity 0.35s;
    }

    .loading.hide { opacity: 0; pointer-events: none; }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #E2E8F0;
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-size: 13px; color: var(--text-sub); }

    /* ===== 에러 ===== */
    .error-notice {
      margin: 0 0 18px;
      padding: 12px 16px;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 10px;
      font-size: 12px;
      color: #B91C1C;
      display: none;
    }
    .error-notice.show { display: block; }

    /* ===== 푸터 ===== */
    .footer {
      border-top: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--text-sub);
      max-width: 1300px;
      margin: 0 auto;
    }

    /* ===== 반응형 ===== */
    @media (max-width: 900px) {
      .menu-grid { grid-template-columns: repeat(2, 1fr); }
      .top-bar-title { font-size: 13px; }
    }

    @media (max-width: 600px) {
      body { min-width: 0; }
      .menu-grid { grid-template-columns: 1fr; }
      .main { padding: 20px 16px 40px; }
      .top-bar {
        padding: 0 16px;
      }
      .top-bar-title {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- 로딩 -->
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">시스템 불러오는 중...</div>
  </div>

  <!-- 상단 헤더 바 -->
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="top-bar-logo" id="headerLogo">PSK Group</div>
      <div class="top-bar-divider"></div>
      <div class="top-bar-title" id="headerTitle">AQI (Assembly Quality Inspection) System</div>
    </div>
    <div class="top-bar-right">
      <span id="headerDate"></span>
      <span class="top-bar-version" id="headerVersion">v0.2.1</span>
    </div>
  </div>

  <!-- 탭 네비 -->
  <nav class="tab-nav">
    <div class="tab-item active">
      <span class="tab-icon">🏠</span> 메인 대시보드
    </div>
    <div class="tab-item">
      <span class="tab-icon">📋</span> 작업 이력
    </div>
    <div class="tab-item">
      <span class="tab-icon">⚙️</span> 관리자
    </div>
  </nav>

  <!-- 본문 -->
  <main class="main">
    <div class="error-notice" id="errorNotice"></div>
    <div class="section-label">메뉴 선택</div>
    <div class="menu-grid" id="menuGrid">
      <!-- dashboard.json 에서 동적 생성 -->
    </div>
  </main>

  <!-- 푸터 -->
  <footer class="footer">
    <span id="footerInfo">PSK Group · AQI (Assembly Quality Inspection) System</span>
    <span id="footerVersion">v0.2.1 · 2026-05-08</span>
  </footer>

  <script>
    /* ===== 설정 영역 - 여기만 수정 ===== */
    const CONFIG = {
      DASHBOARD_JSON: '../config/dashboard.json',
    };

    // 화면 URL 매핑 (id → 파일명) — 화면 추가 시 여기만 수정
    const SCREEN_MAP = {
      defect:   'issue.html',
      standard: 'standard.html',
      torque:   'torque.html',
      leak:     'leak.html',
      visual:   'visual.html',
      report:   'report.html',
    };
    /* ==================================== */

    // 기본 메타 정보 (dashboard.json 로드 실패 시 폴백)
    const DEFAULT_META = {
      title: 'AQI (Assembly Quality Inspection) System',
      subtitle: 'PSK Group',
      version: 'v0.2.1',
      lastModified: '2026-05-08'
    };

    // 기본 메뉴 (dashboard.json 로드 실패 시 폴백)
    const DEFAULT_MENUS = [
      { id: 'defect',   icon: '🔍', label: 'Issue DB',          desc: 'Issue 사례 조회 및 작업 전 체크리스트', color: '#C0392B', enabled: true  },
      { id: 'standard', icon: '📋', label: 'Working Spec',     desc: 'Critical Defect 공정 표준서',           color: '#2980B9', enabled: false },
      { id: 'torque',   icon: '🔧', label: 'Torque Check',      desc: '토크 체결값 측정 및 기록',             color: '#1A3A5C', enabled: false },
      { id: 'leak',     icon: '💨', label: 'Leak Check',        desc: 'Leak Check 값 측정 및 기록',           color: '#1E8C45', enabled: false },
      { id: 'visual',   icon: '👁️', label: 'Visual Check',      desc: '외관 검사 기록 및 이력 관리',           color: '#7B3FA0', enabled: false },
      { id: 'report',   icon: '📊', label: 'Automated Report',  desc: '자동 보고서 생성 및 다운로드',           color: '#E67E22', enabled: false },
    ];

    // 날짜 표시
    function setDate() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      document.getElementById('headerDate').textContent = `${y}.${m}.${d}`;
    }

    // dashboard.json의 title/subtitle/version 정보를 화면에 반영
    function applyDashboardMeta(data) {
      const meta = {
        title: data.title || DEFAULT_META.title,
        subtitle: data.subtitle || DEFAULT_META.subtitle,
        version: data.version || DEFAULT_META.version,
        lastModified: data.lastModified || DEFAULT_META.lastModified
      };

      document.title = `${meta.title} — ${meta.subtitle}`;

      document.getElementById('headerLogo').textContent = meta.subtitle;
      document.getElementById('headerTitle').textContent = meta.title;
      document.getElementById('headerVersion').textContent = meta.version;

      document.getElementById('footerInfo').textContent = `${meta.subtitle} · ${meta.title}`;
      document.getElementById('footerVersion').textContent = `${meta.version} · ${meta.lastModified}`;
    }

    // dashboard.json 로드 → 카드 생성
    async function loadDashboard() {
      try {
        const res = await fetch(CONFIG.DASHBOARD_JSON);
        if (!res.ok) throw new Error('dashboard.json 로드 실패');
        const data = await res.json();

        // dashboard.json 메타 정보 반영
        applyDashboardMeta(data);

        // 메뉴 카드 생성
        buildCards(data.menus || []);
      } catch (e) {
        console.warn('dashboard.json 로드 실패, 기본 메뉴 사용:', e);
        showError('⚠️ dashboard.json을 불러오지 못했습니다. 기본 메뉴를 표시합니다.');

        // 폴백 메타 정보 반영
        applyDashboardMeta(DEFAULT_META);

        // 폴백 메뉴 생성
        buildCards(DEFAULT_MENUS);
      } finally {
        setTimeout(() => {
          document.getElementById('loading').classList.add('hide');
        }, 350);
      }
    }

    // 카드 생성
    function buildCards(menus) {
      const grid = document.getElementById('menuGrid');
      grid.innerHTML = '';

      menus.forEach((m, i) => {
        const url = SCREEN_MAP[m.id] || '#';
        const isReady = !!SCREEN_MAP[m.id] && m.enabled;

        const card = document.createElement('a');
        card.href = isReady ? url : 'javascript:void(0)';
        card.className = 'menu-card' + (m.enabled ? '' : ' disabled');
        card.style.setProperty('--card-color', m.color || '#6B21A8');
        card.style.animationDelay = (i * 0.07) + 's';

        card.innerHTML = `
          <span class="card-badge ${isReady ? 'ready' : 'wait'}">${isReady ? '사용 가능' : '준비 중'}</span>
          <span class="card-icon">${m.icon || '📄'}</span>
          <div class="card-label">${m.label}</div>
          <div class="card-desc">${m.desc || ''}</div>
          <span class="card-arrow">›</span>
        `;

        grid.appendChild(card);
      });
    }

    function showError(msg) {
      const el = document.getElementById('errorNotice');
      el.textContent = msg;
      el.classList.add('show');
    }

    // 초기화
    setDate();
    loadDashboard();
  </script>
</body>
</html>
