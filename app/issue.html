<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AQI Issue DB</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #102A43;
      --primary2: #1A3A5C;
      --accent: #C9951A;
      --accent2: #E8A020;
      --bg: #F5F7FA;
      --surface: #FFFFFF;
      --surface2: #F8FAFC;
      --surface3: #EEF2F6;
      --text: #1F2933;
      --text2: #52616F;
      --text3: #8A97A6;
      --border: #DDE5EE;
      --border2: #C9D3DF;
      --red-bg: #FDECEC;
      --red-txt: #B42318;
      --amber-bg: #FFF4D6;
      --amber-txt: #9A6700;
      --green: #0F8A5F;
      --green-bg: #E5F7EF;
      --blue-bg: #E8F1FC;
      --blue-txt: #185FA5;
      --purple-bg: #F4F0FF;
      --purple-txt: #5B3DB6;
      --purple-border: #D8CCFF;
      --shadow: 0 2px 10px rgba(16, 42, 67, .05);
      --shadow2: 0 10px 28px rgba(16, 42, 67, .10);
      --r: 10px;
      --rl: 16px;
    }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      min-width: 1100px;
    }

    button,
    input,
    select,
    textarea {
      font-family: inherit;
    }

    .hdr {
      background: linear-gradient(90deg, #0B1F33 0%, #102A43 65%, #123A5A 100%);
      color: #fff;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 16px rgba(16, 42, 67, .18);
    }

    .hdr small {
      color: var(--accent2);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .5px;
      display: block;
      margin-bottom: 2px;
    }

    .hdr h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.3px;
    }

    .hdr-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
    }

    .badge-gray {
      background: rgba(255, 255, 255, .12);
      color: rgba(255, 255, 255, .9);
      border: 1px solid rgba(255, 255, 255, .16);
    }

    .badge-green {
      background: rgba(15, 138, 95, .18);
      color: #A8F0D1;
      border: 1px solid rgba(168, 240, 209, .24);
      display: none;
    }

    .btn-sm {
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
      background: none;
      color: rgba(255, 255, 255, .82);
      border: 1px solid rgba(255, 255, 255, .24);
    }

    .btn-sm:hover {
      border-color: var(--accent2);
      color: #fff;
    }

    .btn-logout,
    .btn-save-file {
      display: none;
    }

    .tab-wrap {
      background: #fff;
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 0 28px;
      overflow-x: auto;
    }

    .tab-bar {
      display: flex;
      max-width: 1360px;
      margin: 0 auto;
    }

    .tab {
      padding: 15px 24px;
      font-size: 13px;
      cursor: pointer;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text2);
      background: none;
      font-weight: 700;
      white-space: nowrap;
    }

    .tab:hover {
      color: var(--primary);
      background: #FAFBFC;
    }

    .tab.on {
      color: var(--primary);
      border-bottom-color: var(--accent);
      font-weight: 800;
    }

    .tab-admin {
      display: none;
    }

    .content {
      max-width: 1360px;
      margin: 0 auto;
      padding: 24px 28px 40px;
    }

    .sec {
      display: none !important;
    }

    .sec.on {
      display: block !important;
    }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--rl);
      padding: 16px 18px;
      box-shadow: var(--shadow);
    }

    .stat-num {
      font-size: 26px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }

    .stat-label {
      font-size: 11.5px;
      color: #64748B;
      font-weight: 700;
      margin-top: 6px;
    }

    .filter-toolbar {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--rl);
      padding: 13px 14px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .filter-title {
      font-size: 14px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1.2;
    }

    .filter-sub {
      font-size: 12px;
      color: #64748B;
      margin-top: 4px;
      font-weight: 600;
    }

    .btn-filter-toggle {
      border: 1px solid var(--border2);
      background: #fff;
      color: var(--text2);
      border-radius: 999px;
      padding: 8px 14px;
      min-height: 36px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .btn-filter-toggle:hover {
      border-color: var(--accent);
      color: var(--primary);
      background: #F8FAFC;
    }

    .filter-row {
      display: grid;
      grid-template-columns: 1.3fr repeat(6, minmax(120px, .7fr)) 1fr 1fr auto;
      gap: 8px;
      align-items: center;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--rl);
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .filter-row.is-collapsed {
      display: none !important;
    }

    .filter-row input,
    .filter-row select,
    .field input,
    .field select,
    .field textarea,
    .login-field input,
    .sign-input {
      font-size: 13px;
      padding: 8px 10px;
      border-radius: var(--r);
      border: 1px solid var(--border2);
      background: #fff;
      color: var(--text);
      outline: none;
      width: 100%;
      min-height: 38px;
    }

    .filter-row input:focus,
    .filter-row select:focus,
    .field input:focus,
    .field select:focus,
    .field textarea:focus,
    .login-field input:focus,
    .sign-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201, 149, 26, .14);
    }

    .btn-reset,
    .btn-detail,
    .btn-close,
    .btn-secondary {
      font-size: 12px;
      padding: 8px 14px;
      border: 1px solid var(--border2);
      border-radius: var(--r);
      background: #fff;
      color: var(--text2);
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-reset:hover,
    .btn-detail:hover,
    .btn-close:hover,
    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--primary);
      background: #F8FAFC;
    }

    .result-info {
      color: var(--text2);
      font-size: 13px;
      font-weight: 800;
      margin: 18px 0 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--rl);
      padding: 14px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform .16s, box-shadow .16s, border-color .16s;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(201, 149, 26, .48);
      box-shadow: var(--shadow2);
    }

    .card.closed {
      opacity: .72;
    }

    .card-img {
      width: 100%;
      height: 120px;
      background: #F1F5F9;
      border: 1px dashed var(--border2);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      color: var(--text3);
      font-size: 11px;
      gap: 4px;
      overflow: hidden;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
    }

    .tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 800;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tag-a {
      background: var(--red-bg);
      color: var(--red-txt);
      border-color: #F5B5B0;
    }

    .tag-b {
      background: var(--amber-bg);
      color: var(--amber-txt);
      border-color: #F5D47A;
    }

    .tag-c {
      background: var(--green-bg);
      color: #087443;
      border-color: #A9E8C8;
    }

    .tag-n {
      background: #EEF2F6;
      color: var(--text2);
      border-color: var(--border);
    }

    .tag-open {
      background: var(--blue-bg);
      color: var(--blue-txt);
      border-color: #BBD5F5;
    }

    .tag-close {
      background: #ECEFF3;
      color: #5F6B7A;
      border-color: #D5DBE3;
    }

    .tag-source {
      background: var(--purple-bg);
      color: var(--purple-txt);
      border-color: var(--purple-border);
    }

    .card-title {
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 5px;
      line-height: 1.4;
    }

    .card-sub {
      color: var(--text2);
      font-size: 12px;
      line-height: 1.45;
      margin-bottom: 6px;
    }

    .card-meta {
      color: var(--text3);
      font-size: 11.5px;
      padding-top: 8px;
      border-top: 1px solid #E2E8F0;
    }

    .empty {
      text-align: center;
      padding: 3rem;
      color: var(--text3);
      font-size: 13px;
      background: #fff;
      border-radius: var(--rl);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .cl-prog,
    .ci,
    .sign-box,
    .admin-wrap,
    .admin-list {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--rl);
      box-shadow: var(--shadow);
    }

    .cl-prog {
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .prog-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 6px;
    }

    .pbar {
      height: 8px;
      background: #E2E8F0;
      border-radius: 4px;
      overflow: hidden;
    }

    .pfill {
      height: 100%;
      background: linear-gradient(90deg, #0F8A5F, #21B27E);
      border-radius: 4px;
      transition: width .3s;
    }

    .ci {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .ci:hover {
      background: #FAFBFC;
      border-color: rgba(201, 149, 26, .45);
    }

    .ci.done {
      opacity: .6;
      background: #F1F5F9;
    }

    .ci input[type=checkbox] {
      width: 17px;
      height: 17px;
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--green);
    }

    .ci-body {
      flex: 1;
      min-width: 0;
    }

    .ci-top {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .ci-title {
      font-size: 13px;
      font-weight: 800;
    }

    .ci-check {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.5;
    }

    .sign-box {
      border-style: dashed;
      padding: 20px;
      text-align: center;
      margin-top: 16px;
    }

    .sign-label {
      font-size: 12px;
      color: var(--green);
      font-weight: 800;
      margin-bottom: 10px;
      display: block;
    }

    .sign-box p {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 12px;
    }

    .sign-input {
      max-width: 240px;
      margin-bottom: 10px;
    }

    .btn-submit,
    .btn-primary,
    .btn-login-ok {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--r);
      padding: 9px 22px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 800;
    }

    .btn-submit:hover,
    .btn-primary:hover,
    .btn-login-ok:hover {
      background: var(--primary2);
    }

    .admin-wrap {
      padding: 20px;
      margin-bottom: 18px;
      overflow: hidden;
    }

    .admin-wrap h2 {
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .admin-wrap h2::before {
      content: '';
      width: 4px;
      height: 16px;
      border-radius: 999px;
      background: var(--accent);
      display: inline-block;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 12px;
    }

    .form-grid.full {
      grid-template-columns: 1fr;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field label {
      font-size: 12px;
      color: var(--text2);
      font-weight: 800;
    }

    .field textarea {
      min-height: 78px;
      line-height: 1.5;
      resize: vertical;
    }

    .photo-upload-area {
      border: 1.5px dashed var(--border2);
      border-radius: var(--r);
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s;
      margin-top: 4px;
      background: #FAFBFC;
    }

    .photo-upload-area:hover {
      border-color: var(--accent);
    }

    .upload-label {
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      display: block;
    }

    .photo-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .preview-item {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .preview-del {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 18px;
      height: 18px;
      background: rgba(0, 0, 0, .6);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-btn-row {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .admin-list {
      overflow: hidden;
    }

    .admin-list-head,
    .admin-filter-row,
    .admin-list-row {
      display: grid;
      grid-template-columns: 40px 95px 110px 1fr 100px 120px 70px 80px;
      gap: 6px;
      align-items: center;
    }

    .admin-list-head {
      padding: 10px 14px;
      background: #F1F5F9;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--primary);
      font-weight: 800;
      cursor: pointer;
      user-select: none;
    }

    .admin-filter-row {
      padding: 8px 14px;
      background: #FAFBFC;
      border-bottom: 1px solid var(--border);
    }

    .admin-filter-row input {
      width: 100%;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 11px;
    }

    .admin-filter-clear {
      font-size: 11px;
      color: var(--text3);
      cursor: pointer;
      text-decoration: underline;
    }

    .admin-filter-clear:hover {
      color: var(--red-txt);
    }

    .admin-list-row {
      padding: 10px 14px;
      border-bottom: 1px solid #E2E8F0;
      font-size: 12px;
      cursor: pointer;
    }

    .admin-list-row:last-child {
      border-bottom: none;
    }

    .admin-list-row:hover {
      background: #FAFBFC;
    }

    .admin-list-row .title,
    .admin-list-row .meta {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .admin-list-row .title {
      font-weight: 800;
      color: var(--text);
    }

    .admin-list-row .meta {
      color: var(--text2);
    }

    .sort-arrow {
      font-size: 10px;
      margin-left: 2px;
    }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(16, 42, 67, .55);
      backdrop-filter: blur(3px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-bg.on {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 18px;
      width: min(860px, calc(100vw - 40px));
      max-height: 88vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 18px 48px rgba(16, 42, 67, .24);
    }

    .modal-head {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      background: #F8FAFC;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      flex-shrink: 0;
    }

    .modal-head-info {
      flex: 1;
    }

    .modal-head-title {
      font-size: 18px;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 5px;
      line-height: 1.35;
    }

    .modal-head-sub {
      font-size: 12.5px;
      color: var(--text2);
    }

    .modal-body {
      padding: 18px 22px 22px;
      overflow-y: auto;
      flex: 1;
      background: #fff;
    }

    .issue-detail-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
      align-items: start;
    }

    .issue-photo-panel {
      background: #F1F5F9;
      border: 1px solid var(--border);
      border-radius: var(--rl);
      padding: 10px;
    }

    .photo-count {
      font-size: 11.5px;
      color: #64748B;
      margin-bottom: 8px;
      font-weight: 700;
      text-align: left;
    }

    .photo-scroll {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 420px;
      overflow-y: auto;
      background: transparent;
      border-radius: var(--r);
      padding: 0;
      margin-bottom: 0;
    }

    .photo-item {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      object-fit: contain;
      background: #fff;
      display: block;
    }

    .photo-empty {
      height: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text3);
      font-size: 12px;
      gap: 6px;
      background: #fff;
      border: 1px dashed var(--border2);
      border-radius: 12px;
    }

    .issue-info-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .issue-section {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 14px;
      box-shadow: 0 2px 10px rgba(16, 42, 67, .04);
    }

    .issue-section-title {
      font-size: 11px;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: .6px;
      margin-bottom: 8px;
    }

    .issue-section-body {
      font-size: 13px;
      color: var(--text);
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .issue-section.check {
      border-color: #A9E8C8;
      background: #F4FBF8;
    }

    .issue-section.check .issue-section-title {
      color: var(--green);
    }

    .issue-section.check .issue-section-body {
      color: #0F6E56;
      font-weight: 700;
    }

    .issue-meta-grid {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 7px 10px;
      font-size: 12.5px;
    }

    .meta-k {
      color: #64748B;
      font-weight: 800;
    }

    .meta-v {
      color: var(--text);
      font-weight: 700;
    }

    .admin-ctrl {
      display: none;
      margin-top: 0;
      border-radius: 14px;
      background: #F8FAFC;
      border: 1px solid var(--border);
      padding: 12px 14px;
    }

    .admin-ctrl.show {
      display: block;
    }

    .admin-ctrl-title {
      color: #64748B;
      font-size: 11px;

  <script>
    var AID = 'admin', APW = 'psk1234', isAdmin = false;
    var ISSUE_OPTIONS_FALLBACK = {
      models: ['GENEVA STP300xp', 'ECOLITE3000', 'CVD-3000', 'ALD-200', 'ETCH-500'],
      categories: ['배관류', '가공품', '체결부품', '전장부품'],
      defectTypes: ['치수오차', '형상불일치', '센터링', '표면불량'],
      grades: ['A', 'B', 'C'],
      statuses: ['Open', 'Close'],
      vendors: ['나우', '이지스', '아셈', 'SE&T', 'SAM', 'HTC']
    };

    var ISSUE_OPTIONS = ISSUE_OPTIONS_FALLBACK;

    async function loadIssueOptions() {
      try {
        var res = await fetch('../config/issue_options.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('issue_options.json 로드 실패: ' + res.status);

        var data = await res.json();
        ISSUE_OPTIONS = Object.assign({}, ISSUE_OPTIONS_FALLBACK, data);

        console.log('[AQI] issue_options.json 로드 완료');
      } catch (err) {
        console.warn('[AQI] 옵션 JSON 로드 실패. 기본 옵션 사용:', err);
        ISSUE_OPTIONS = ISSUE_OPTIONS_FALLBACK;
      }
    }

    function fillSelect(id, items, firstLabel, keepValue) {
      var el = document.getElementById(id);
      if (!el) return;

      var current = keepValue ? el.value : '';
      var html = '<option value="">' + firstLabel + '</option>';

      items.forEach(function (v) {
        html += '<option value="' + v + '">' + v + '</option>';
      });

      el.innerHTML = html;

      if (current) el.value = current;
    }

    function applyIssueOptions() {
      fillSelect('fm', ISSUE_OPTIONS.models, '전체 모델', true);
      fillSelect('fcat', ISSUE_OPTIONS.categories, '전체 카테고리', true);
      fillSelect('ft', ISSUE_OPTIONS.defectTypes, '전체 불량유형', true);
      fillSelect('fg', ISSUE_OPTIONS.grades, '전체 등급', true);
      fillSelect('fs', ISSUE_OPTIONS.statuses, '전체 상태', true);
      fillSelect('fvendor', ISSUE_OPTIONS.vendors, '전체 협력사', true);

      fillSelect('cl-model', ISSUE_OPTIONS.models, '모델 선택', true);
      fillSelect('cl-cat', ISSUE_OPTIONS.categories, '카테고리 선택', true);

      fillSelect('f-model', ISSUE_OPTIONS.models, '선택', true);
      fillSelect('f-cat', ISSUE_OPTIONS.categories, '선택', true);
      fillSelect('f-type', ISSUE_OPTIONS.defectTypes, '선택', true);
      fillSelect('f-vendor', ISSUE_OPTIONS.vendors, '선택', true);

    function deleteRecord(id) { var d = DB.find(function (x) { return x.id === id; }); if (!d) return; if (!confirm('[' + d.title + ']\n이 사례를 삭제하시겠습니까?\n삭제 후 파일 저장을 통해 반영하세요.')) return; DB = DB.filter(function (x) { return x.id !== id; }); closeDetail(); drawCards(); drawAdminList(); drawCL(); }

    document.addEventListener('paste', function (e) {
      var pasteArea = document.getElementById('paste-area'); if (!pasteArea) return;
      var adminOn = document.getElementById('sec-admin').classList.contains('on'); if (!adminOn) return;
      var items = e.clipboardData && e.clipboardData.items; if (!items) return;
      var hasImage = false;
      for (var i = 0; i < items.length; i++) if (items[i].type.indexOf('image') !== -1) { hasImage = true; var blob = items[i].getAsFile(); var reader = new FileReader(); reader.onload = function (ev) { editPhotos.push(ev.target.result); renderPhotoPreview(); var hint = document.getElementById('paste-hint'); if (hint) hint.innerHTML = '✅ 이미지 추가됨 — 추가로 <strong>Ctrl+V</strong> 가능'; }; reader.readAsDataURL(blob); }
      if (!hasImage) { var hint = document.getElementById('paste-hint'); if (hint) { hint.innerHTML = '⚠️ 이미지가 아닙니다. 캡처 후 Ctrl+V 해주세요'; setTimeout(function () { hint.innerHTML = '이 영역을 클릭 후 <strong>Ctrl+V</strong> 로 이미지를 붙여넣으세요'; }, 2500); } }
    });
    function renderPhotoPreview() { var el = document.getElementById('photo-preview'); el.innerHTML = editPhotos.map(function (src, i) { return '<div class="preview-item"><img src="' + esc(src) + '"><button class="preview-del" onclick="removePhoto(' + i + ')" title="삭제">✕</button></div>'; }).join(''); }
    function removePhoto(i) { editPhotos.splice(i, 1); renderPhotoPreview(); }

    function todayStr() {
      var d = new Date();
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }

    function setDefaultDates() {
      var occ = document.getElementById('f-occdate');
      if (occ && !occ.value) occ.value = todayStr();
    }

    function clearFieldErrors() {
      document.querySelectorAll('.field-error').forEach(function (el) {
        el.classList.remove('field-error');
      });
    }

    function markFieldError(id) {
      var el = document.getElementById(id);
      if (el) el.classList.add('field-error');
    }

    function validateRequiredFields() {
      clearFieldErrors();

      var required = [
        { id: 'f-model', name: '모델명' },
        { id: 'f-cat', name: '카테고리' },
        { id: 'f-part', name: '부품명' },
        { id: 'f-type', name: '불량 유형' },
        { id: 'f-grade', name: '등급' },
        { id: 'f-vendor', name: '발생 협력사' },
        { id: 'f-occdate', name: '발생일' },
        { id: 'f-title', name: '불량 제목' },
        { id: 'f-detail', name: '불량 내용' },
        { id: 'f-check', name: '확인 방법' }
      ];

      var missing = [];

      required.forEach(function (f) {
        var el = document.getElementById(f.id);
        if (!el || !el.value.trim()) {
          missing.push(f.name);
          markFieldError(f.id);
        }
      });

      if (missing.length > 0) {
        alert('필수 항목을 입력해 주세요.\n\n- ' + missing.join('\n- '));

        var first = document.querySelector('.field-error');
        if (first) {
          first.focus();
          first.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        return false;
      }

      return true;
    }

    function saveRecord() {
      var model = fv('f-model'), cat = fv('f-cat'), part = fv('f-part'), partNo = fv('f-partno'), type = fv('f-type'), grade = fv('f-grade'), status = fv('f-status'), vendor = fv('f-vendor'), source = fv('f-source'), sourceDetail = fv('f-source-detail'), occDate = fv('f-occdate'), inspDate = fv('f-inspdate'), title = fv('f-title'), detail = fv('f-detail'), check = fv('f-check'), result = fv('f-result'), action = fv('f-action');
      if (!validateRequiredFields()) return;
      var eid = fv('edit-id');
      if (eid) { var d = DB.find(function (x) { return x.id === parseInt(eid, 10); }); if (d) { d.model = model; d.cat = cat; d.part = part; d.partNo = partNo; d.type = type; d.grade = grade; d.status = status; d.vendor = vendor; d.source = source; d.sourceDetail = sourceDetail; d.occDate = occDate; d.inspDate = inspDate; d.title = title; d.detail = detail; d.check = check; d.result = result; d.action = action; d.photos = editPhotos.slice(); } alert('수정되었습니다.'); }
      else { DB.push({ id: nextId++, model: model, cat: cat, part: part, partNo: partNo, type: type, grade: grade, status: status, title: title, detail: detail, check: check, result: result, action: action, vendor: vendor, source: source, sourceDetail: sourceDetail, occDate: occDate, inspDate: inspDate, photos: editPhotos.slice() }); alert('등록되었습니다.'); }
      resetForm();
      resetSearchFilters();
      drawCards();
      drawAdminList();
      drawCL();
      switchTab('search');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function startEdit(id) { var d = DB.find(function (x) { return x.id === id; }); if (!d) return; closeDetail(); switchTab('admin'); sv('edit-id', d.id); sv('f-model', d.model); sv('f-cat', d.cat); sv('f-part', d.part); sv('f-partno', d.partNo); sv('f-type', d.type); sv('f-grade', d.grade); sv('f-status', d.status); sv('f-vendor', d.vendor); sv('f-source', d.source); sv('f-source-detail', d.sourceDetail); sv('f-occdate', d.occDate); sv('f-inspdate', d.inspDate); sv('f-title', d.title); sv('f-detail', d.detail); sv('f-check', d.check); sv('f-result', d.result); sv('f-action', d.action); editPhotos = d.photos ? d.photos.slice() : []; renderPhotoPreview(); document.getElementById('form-title').textContent = '사례 수정 — ' + d.title; document.getElementById('form-wrap').scrollIntoView({ behavior: 'smooth' }); }
    function resetForm() { ['f-model', 'f-cat', 'f-part', 'f-partno', 'f-type', 'f-grade', 'f-vendor', 'f-source', 'f-source-detail', 'f-occdate', 'f-inspdate', 'f-title', 'f-detail', 'f-check', 'f-result', 'f-action'].forEach(function (id) { sv(id, ''); }); sv('f-status', 'Open'); sv('edit-id', ''); editPhotos = []; renderPhotoPreview(); document.getElementById('form-title').textContent = '신규 사례 등록'; var hint = document.getElementById('paste-hint'); if (hint) hint.innerHTML = '이 영역을 클릭 후 <strong>Ctrl+V</strong> 로 이미지를 붙여넣으세요'; }
    setDefaultDates();
    clearFieldErrors();

    function arr(key) { if (adminSort.key !== key) return '<span class="sort-arrow">⇅</span>'; return '<span class="sort-arrow">' + (adminSort.asc ? '↑' : '↓') + '</span>'; }
    function sortBy(key) { if (adminSort.key === key) adminSort.asc = !adminSort.asc; else { adminSort.key = key; adminSort.asc = true; } drawAdminList(); }
    function onFilterInput(field, value) { adminFilter[field] = value; clearTimeout(_filterTimer); _filterTimer = setTimeout(renderDataRows, 250); }
    function getFiltered() { var f = DB.filter(function (d) { return (!adminFilter.no || String(d.id).includes(adminFilter.no)) && (!adminFilter.cat || (d.cat || '').toLowerCase().includes(adminFilter.cat.toLowerCase())) && (!adminFilter.model || (d.model || '').toLowerCase().includes(adminFilter.model.toLowerCase())) && (!adminFilter.title || (d.title || '').toLowerCase().includes(adminFilter.title.toLowerCase())) && (!adminFilter.vendor || (d.vendor || '').toLowerCase().includes(adminFilter.vendor.toLowerCase())) && (!adminFilter.source || (d.source || '').toLowerCase().includes(adminFilter.source.toLowerCase())) && (!adminFilter.grade || (d.grade || '').toLowerCase().includes(adminFilter.grade.toLowerCase())) && (!adminFilter.status || (d.status || '').toLowerCase().includes(adminFilter.status.toLowerCase())); }); f.sort(function (a, b) { var va = a[adminSort.key] || '', vb = b[adminSort.key] || ''; return (va < vb ? -1 : va > vb ? 1 : 0) * (adminSort.asc ? 1 : -1); }); return f; }
    function renderDataRows() { var filtered = getFiltered(); document.getElementById('admin-list-count').textContent = '— 총 ' + DB.length + '건' + (filtered.length < DB.length ? ' (필터: ' + filtered.length + '건)' : ''); var body = document.getElementById('admin-list-body'); if (!body) { drawAdminList(); return; } body.innerHTML = filtered.length ? filtered.map(function (d) { return '<div class="admin-list-row" onclick="startEdit(' + d.id + ')"><span class="meta">' + d.id + '</span><span class="meta">' + esc(d.cat || '-') + '</span><span class="meta">' + esc(d.model || '-') + '</span><span class="title">' + esc(d.title || '-') + '</span><span class="meta">' + esc(d.vendor || '-') + '</span><span class="meta">' + esc(d.source || '-') + '</span><span>' + gb(d.grade) + '</span><span>' + sb(d.status) + '</span></div>'; }).join('') : '<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">필터 조건에 맞는 항목이 없습니다.</div>'; }
    function drawAdminList() { var el = document.getElementById('admin-list'); if (!el) return; if (!DB.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">등록된 사례가 없습니다.</div>'; return; } var keys = ['id', 'cat', 'model', 'title', 'vendor', 'source', 'grade', 'status']; var labels = ['No', 'Category', 'Model', 'Title', '발생 협력사', '제기 경로', '등급', '상태']; var pholds = ['No', 'Category', 'Model', 'Title', '협력사', '제기 경로', '등급', '상태']; var fvals = [adminFilter.no, adminFilter.cat, adminFilter.model, adminFilter.title, adminFilter.vendor, adminFilter.source, adminFilter.grade, adminFilter.status]; var headHTML = '<div class="admin-list-head">' + keys.map(function (k, i) { return '<span data-sk="' + k + '">' + labels[i] + arr(k) + '</span>'; }).join('') + '</div>'; var filterHTML = '<div class="admin-filter-row">' + keys.map(function (k, i) { return '<input type="text" id="af-' + k + '" data-fk="' + k + '" placeholder="' + pholds[i] + '" value="' + esc(fvals[i] || '') + '">'; }).join('') + '</div>'; el.innerHTML = headHTML + filterHTML + '<div id="admin-list-body"></div>'; el.querySelector('.admin-list-head').addEventListener('click', function (e) { var t = e.target.closest('[data-sk]'); if (t) sortBy(t.getAttribute('data-sk')); }); el.querySelector('.admin-filter-row').addEventListener('input', function (e) { var inp = e.target; if (inp.dataset.fk) onFilterInput(inp.dataset.fk, inp.value); }); renderDataRows(); }
    function clearAdminFilter() { adminFilter = { no: '', cat: '', model: '', title: '', vendor: '', source: '', grade: '', status: '' }; adminSort = { key: 'id', asc: true }; drawAdminList(); }

    function drawCL() { var m = fv('cl-model'), c = fv('cl-cat'), pw = document.getElementById('cl-prog-wrap'), sign = document.getElementById('cl-sign'), list = document.getElementById('cl-list'); if (!m) { list.innerHTML = '<div class="empty">모델을 선택하면<br>해당 주의 항목이 표시됩니다.</div>'; pw.style.display = 'none'; sign.style.display = 'none'; return; } var items = DB.filter(function (d) { return d.model === m && d.status === 'Open' && (!c || d.cat === c); }); if (!items.length) { list.innerHTML = '<div class="empty">해당 조합의 Open 불량 사례가 없습니다.<br><span style="font-size:12px;color:var(--green)">안전하게 조립을 진행하세요.</span></div>'; pw.style.display = 'none'; sign.style.display = 'none'; return; } pw.style.display = 'block'; list.innerHTML = items.map(function (d) { var done = !!checkState[d.id]; return '<div class="ci' + (done ? ' done' : '') + '" id="ci-' + d.id + '" onclick="togCL(' + d.id + ')"><input type="checkbox"' + (done ? ' checked' : '') + ' onclick="event.stopPropagation();togCL(' + d.id + ')"><div class="ci-body"><div class="ci-top">' + gb(d.grade) + '<span class="ci-title">' + esc(d.title) + '</span></div><div class="ci-check">확인: ' + esc(d.check) + '</div></div><button class="btn-detail" onclick="event.stopPropagation();openDetail(' + d.id + ')">상세보기</button></div>'; }).join(''); updProg(items); }
    function togCL(id) { checkState[id] = !checkState[id]; var m = fv('cl-model'), c = fv('cl-cat'); var items = DB.filter(function (d) { return d.model === m && d.status === 'Open' && (!c || d.cat === c); }); var el = document.getElementById('ci-' + id); if (el) { el.classList.toggle('done', !!checkState[id]); el.querySelector('input').checked = !!checkState[id]; } updProg(items); }
    function updProg(items) { var done = items.filter(function (d) { return checkState[d.id]; }).length, total = items.length; document.getElementById('prog-txt').textContent = done + ' / ' + total; document.getElementById('pfill').style.width = total ? Math.round(done / total * 100) + '%' : '0%'; document.getElementById('cl-sign').style.display = (done === total && total > 0) ? 'block' : 'none'; }
    function resetCL() { Object.keys(checkState).forEach(function (k) { delete checkState[k]; }); drawCL(); }
    function submitSign() { var name = fv('sign-name'); if (!name) { alert('작업자 이름을 입력해 주세요.'); return; } var now = new Date(); var ts = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0') + ' ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0'); alert('[ 확인 완료 ]\n작업자: ' + name + '\n시각: ' + ts + '\n\n조립을 착수해 주세요.'); }
    function saveAsFile() { var blob = new Blob([JSON.stringify(DB, null, 2)], { type: 'application/json;charset=utf-8' }); var a = document.createElement('a'); var today = new Date(); var ds = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0'); a.href = URL.createObjectURL(blob); a.download = ds + '_sample_issues.json'; a.click(); URL.revokeObjectURL(a.href); alert('JSON 파일이 다운로드되었습니다.\n\n운영 반영 방법:\n1. 다운로드된 JSON 파일 이름을 sample_issues.json 으로 변경\n2. AQI_Fixture/data/sample_issues.json 파일과 교체\n3. 브라우저 새로고침'); }
    function bgClick(e, id) { if (e.target === document.getElementById(id)) { if (id === 'detail-bg') closeDetail(); else if (id === 'login-bg') closeLogin(); } }

    ['kw', 'fm', 'fcat', 'ft', 'fg', 'fs', 'fvendor', 'fsource', 'fdateFrom', 'fdateTo'].forEach(function (id) { document.getElementById(id).addEventListener(id === 'kw' || id === 'fsource' ? 'input' : 'change', drawCards); });
    ['cl-model', 'cl-cat'].forEach(function (id) { document.getElementById(id).addEventListener('change', function () { checkState = {}; drawCL(); }); });
    async function initApp() {
      await loadIssueOptions();
      applyIssueOptions();

      await loadIssueData();

      setInitialFilterState();
      setDefaultDates();
      drawCards();
      drawCL(); window.addEventListener('resize', function () { var panel = document.getElementById('searchFilterPanel'), btn = document.getElementById('btnFilterToggle'); if (!panel || !btn) return; btn.textContent = panel.classList.contains('is-collapsed') ? '필터 열기' : '필터 접기'; });
    }
    initApp();
  </script>
