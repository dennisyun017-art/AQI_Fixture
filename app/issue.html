<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue DB</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #fff;
      --bg2: #f5f5f5;
      --bg3: #ebebeb;
      --text: #111;
      --text2: #555;
      --text3: #999;
      --border: #e0e0e0;
      --border2: #ccc;
      --green: #0f6e56;
      --green-bg: #e1f5ee;
      --red-bg: #fcebeb;
      --red-txt: #a32d2d;
      --amber-bg: #faeeda;
      --amber-txt: #854f0b;
      --teal-bg: #e1f5ee;
      --teal-txt: #0f6e56;
      --blue-bg: #e6f1fb;
      --blue-txt: #185fa5;
      --r: 8px;
      --rl: 12px;
    }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f0f0;
      color: var(--text);
      font-size: 14px
    }

    /* 헤더 */
    .hdr {
      background: #1a1a1a;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .hdr h1 {
      font-size: 16px;
      font-weight: 600
    }

    .hdr-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px
    }

    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px
    }

    .badge-gray {
      background: #333;
      color: #ccc
    }

    .badge-green {
      background: #2d4a2d;
      color: #7ec87e;
      display: none
    }

    .btn-sm {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit
    }

    .btn-login {
      border: 1px solid #555;
      background: none;
      color: #aaa
    }

    .btn-login:hover {
      border-color: #999;
      color: #fff
    }

    .btn-logout {
      border: 1px solid #4a6a4a;
      background: none;
      color: #7ec87e;
      display: none
    }

    .btn-logout:hover {
      color: #9ee09e
    }

    .btn-save-file {
      border: 1px solid #4a6a8a;
      background: none;
      color: #7ab0de;
      display: none
    }

    .btn-save-file:hover {
      color: #9ecaee
    }

    /* 탭 */
    .tab-wrap {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 24px
    }

    .tab-bar {
      display: flex
    }

    .tab {
      padding: 12px 20px;
      font-size: 13px;
      cursor: pointer;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text2);
      background: none;
      font-family: inherit;
      font-weight: 500
    }

    .tab.on {
      color: #1a1a1a;
      border-bottom-color: #1a1a1a
    }

    .tab-admin {
      display: none
    }

    /* 컨텐츠 */
    .content {
      padding: 20px 24px;
      max-width: 1280px;
      margin: 0 auto
    }

    .sec {
      display: none
    }

    .sec.on {
      display: block
    }

    /* 필터 */
    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      align-items: center
    }

    .filter-row input,
    .filter-row select {
      font-size: 13px;
      padding: 7px 10px;
      border-radius: var(--r);
      border: 1px solid var(--border2);
      background: #fff;
      color: var(--text);
      font-family: inherit;
      outline: none
    }

    .filter-row input:focus,
    .filter-row select:focus {
      border-color: #555
    }

    .filter-row input {
      flex: 1;
      min-width: 150px
    }

    /* 통계 */
    .stat-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap
    }

    .stat-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 10px 16px;
      flex: 1;
      min-width: 90px
    }

    .stat-num {
      font-size: 22px;
      font-weight: 700;
      line-height: 1
    }

    .stat-label {
      font-size: 11px;
      color: var(--text2);
      margin-top: 4px
    }

    /* 카드 그리드 */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--rl);
      padding: 14px;
      cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
      position: relative
    }

    .card:hover {
      border-color: #999;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08)
    }

    .card.closed {
      opacity: .5
    }

    .card-img {
      width: 100%;
      height: 110px;
      background: var(--bg2);
      border-radius: var(--r);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      color: var(--text3);
      font-size: 11px;
      border: 1px dashed var(--border2);
      gap: 4px;
      overflow: hidden
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: var(--r)
    }

    .tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 8px
    }

    .tag {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 600
    }

    .tag-a {
      background: var(--red-bg);
      color: var(--red-txt)
    }

    .tag-b {
      background: var(--amber-bg);
      color: var(--amber-txt)
    }

    .tag-c {
      background: var(--teal-bg);
      color: var(--teal-txt)
    }

    .tag-n {
      background: var(--bg2);
      color: var(--text2)
    }

    .tag-open {
      background: var(--blue-bg);
      color: var(--blue-txt)
    }

    .tag-close {
      background: #f1efe8;
      color: #5f5e5a
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.4
    }

    .card-sub {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 6px
    }

    .card-meta {
      font-size: 11px;
      color: var(--text3)
    }

    .empty {
      text-align: center;
      padding: 3rem;
      color: var(--text3);
      font-size: 13px;
      background: #fff;
      border-radius: var(--rl);
      border: 1px solid var(--border)
    }

    .result-info {
      font-size: 12px;
      color: #888;
      margin-bottom: 10px
    }

    /* 체크리스트 */
    .cl-prog {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--rl);
      padding: 14px 16px;
      margin-bottom: 12px
    }

    .prog-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 6px
    }

    .pbar {
      height: 8px;
      background: var(--bg3);
      border-radius: 4px;
      overflow: hidden
    }

    .pfill {
      height: 100%;
      background: var(--green);
      border-radius: 4px;
      transition: width .3s
    }

    .ci {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border-radius: var(--r);
      border: 1px solid var(--border);
      margin-bottom: 8px;
      background: #fff;
      cursor: pointer
    }

    .ci:hover {
      background: var(--bg2)
    }

    .ci.done {
      opacity: .55;
      background: var(--bg2)
    }

    .ci input[type=checkbox] {
      width: 17px;
      height: 17px;
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--green)
    }

    .ci-body {
      flex: 1;
      min-width: 0
    }

    .ci-top {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 4px;
      flex-wrap: wrap
    }

    .ci-title {
      font-size: 13px;
      font-weight: 600
    }

    .ci-check {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.5
    }

    .btn-detail {
      font-size: 11px;
      padding: 4px 10px;
      border: 1px solid var(--border2);
      border-radius: var(--r);
      background: #fff;
      color: var(--text2);
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0
    }

    .btn-detail:hover {
      background: var(--bg2)
    }

    .sign-box {
      background: #fff;
      border: 1px dashed var(--border2);
      border-radius: var(--rl);
      padding: 20px;
      text-align: center;
      margin-top: 16px
    }

    .sign-label {
      font-size: 12px;
      color: var(--green);
      font-weight: 600;
      margin-bottom: 10px;
      display: block
    }

    .sign-box p {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 12px
    }

    .sign-input {
      font-size: 13px;
      padding: 7px 12px;
      border-radius: var(--r);
      border: 1px solid var(--border2);
      font-family: inherit;
      width: 200px;
      margin-bottom: 10px;
      outline: none
    }

    .btn-submit {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: var(--r);
      padding: 9px 22px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600
    }

    .btn-submit:hover {
      background: #333
    }

    .btn-reset {
      font-size: 12px;
      padding: 7px 14px;
      border: 1px solid var(--border2);
      border-radius: var(--r);
      background: #fff;
      color: var(--text2);
      cursor: pointer;
      font-family: inherit
    }

    .btn-reset:hover {
      background: var(--bg2)
    }

    /* 모달 공통 */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px
    }

    .modal-bg.on {
      display: flex
    }

    /* 상세 모달 */
    .modal {
      background: #fff;
      border-radius: var(--rl);
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    .modal-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      flex-shrink: 0
    }

    .modal-head-info {
      flex: 1
    }

    .modal-head-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 5px
    }

    .modal-head-sub {
      font-size: 12px;
      color: var(--text2)
    }

    .btn-close {
      background: none;
      border: 1px solid var(--border2);
      border-radius: var(--r);
      padding: 5px 12px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text2);
      font-family: inherit;
      flex-shrink: 0
    }

    .btn-close:hover {
      background: var(--bg2)
    }

    .modal-body {
      padding: 16px 20px;
      overflow-y: auto;
      flex: 1
    }

    .photo-scroll {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 260px;
      overflow-y: auto;
      background: var(--bg2);
      border-radius: var(--r);
      padding: 8px;
      margin-bottom: 14px;
      border: 1px solid var(--border)
    }

    .photo-scroll::-webkit-scrollbar {
      width: 4px
    }

    .photo-scroll::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px
    }

    .photo-item {
      width: 100%;
      border-radius: 6px;
      object-fit: contain;
      background: #fff;
      display: block
    }

    .photo-empty {
      height: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text3);
      font-size: 12px;
      gap: 6px
    }

    .photo-count {
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 4px;
      text-align: right
    }

    .kv {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 13px;
      align-items: flex-start
    }

    .kv .k {
      color: var(--text2);
      min-width: 82px;
      flex-shrink: 0;
      font-weight: 500
    }

    .kv .v {
      color: var(--text);
      line-height: 1.5;
      flex: 1
    }

    .kv .v-green {
      color: var(--green);
      font-weight: 600;
      line-height: 1.5;
      flex: 1
    }

    .sep {
      height: 1px;
      background: var(--border);
      margin: 10px 0
    }

    .admin-ctrl {
      background: #f8f8f6;
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px 14px;
      margin-top: 14px;
      display: none
    }

    .admin-ctrl.show {
      display: block
    }

    .admin-ctrl-title {
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 8px;
      font-weight: 600;
      letter-spacing: .5px
    }

    .ctrl-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .btn-open {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: var(--r);
      border: 1px solid #185fa5;
      background: var(--blue-bg);
      color: #185fa5;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600
    }

    .btn-open:hover {
      background: #d0e5f7
    }

    .btn-close-st {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: var(--r);
      border: 1px solid var(--border2);
      background: var(--bg2);
      color: var(--text2);
      cursor: pointer;
      font-family: inherit;
      font-weight: 600
    }

    .btn-close-st:hover {
      background: var(--bg3)
    }

    .btn-edit {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: var(--r);
      border: 1px solid #854f0b;
      background: var(--amber-bg);
      color: #854f0b;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600
    }

    .btn-edit:hover {
      background: #f5dfc0
    }

    .btn-del {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: var(--r);
      border: 1px solid var(--red-txt);
      background: var(--red-bg);
      color: var(--red-txt);
      cursor: pointer;
      font-family: inherit;
      font-weight: 600
    }

    .btn-del:hover {
      background: #f7d0d0
    }

    /* 관리자 입력 폼 */
    .admin-wrap {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--rl);
      padding: 20px;
      margin-bottom: 16px
    }

    .admin-wrap h2 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border)
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px
    }

    .form-grid.full {
      grid-template-columns: 1fr
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .field label {
      font-size: 12px;
      color: var(--text2);
      font-weight: 500
    }

    .field input,
    .field select,
    .field textarea {
      font-size: 13px;
      padding: 8px 10px;
      border-radius: var(--r);
      border: 1px solid var(--border2);
      background: #fff;
      color: var(--text);
      font-family: inherit;
      outline: none;
      width: 100%
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #555
    }

    .field textarea {
      resize: vertical;
      min-height: 70px;
      line-height: 1.5
    }

    .photo-upload-area {
      border: 1.5px dashed var(--border2);
      border-radius: var(--r);
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s;
      margin-top: 4px
    }

    .photo-upload-area:hover {
      border-color: #888
    }

    .photo-upload-area input[type=file] {
      display: none
    }

    .upload-label {
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      display: block
    }

    .photo-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px
    }

    .preview-item {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border)
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .preview-del {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 18px;
      height: 18px;
      background: rgba(0, 0, 0, .6);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1
    }

    .form-btn-row {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border)
    }

    .btn-primary {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: var(--r);
      padding: 9px 22px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600
    }

    .btn-primary:hover {
      background: #333
    }

    .btn-secondary {
      background: #fff;
      color: var(--text2);
      border: 1px solid var(--border2);
      border-radius: var(--r);
      padding: 9px 18px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit
    }

    .btn-secondary:hover {
      background: var(--bg2)
    }

    /* 관리자 목록 */
    .admin-list {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--rl);
      overflow: hidden
    }

    /* 관리자 목록 필터 행 */
    .admin-filter-row {
      display: grid;
      grid-template-columns: 40px 100px 100px 1fr 90px 70px 80px;
      gap: 6px;
      padding: 8px 14px;
      background: #f8f8f8;
      border-bottom: 1px solid var(--border);
    }
    .admin-filter-row input {
      width: 100%;
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 11px;
      color: var(--text);
      background: #fff;
    }
    .admin-filter-row input:focus {
      outline: none;
      border-color: var(--green);
    }
    .admin-filter-clear {
      font-size: 11px;
      color: var(--text3);
      cursor: pointer;
      text-align: center;
      padding: 4px 0;
      text-decoration: underline;
    }
    .admin-filter-clear:hover { color: var(--red-txt); }

    .admin-list-head {
      display: grid;
      grid-template-columns: 40px 100px 100px 1fr 90px 70px 80px;
      gap: 6px;
      padding: 10px 14px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text2);
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }
    .admin-list-head span:hover { color: var(--text); }
    .sort-arrow { font-size: 10px; margin-left: 2px; }

    .admin-list-row {
      display: grid;
      grid-template-columns: 40px 100px 100px 1fr 90px 70px 80px;
      gap: 6px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      align-items: center;
      cursor: pointer;
      transition: background .1s
    }

    .admin-list-row:last-child {
      border-bottom: none
    }

    .admin-list-row:hover {
      background: var(--bg2)
    }

    .admin-list-row .title {
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .admin-list-row .meta {
      color: var(--text2)
    }

    .admin-list-row .act {
      display: flex;
      gap: 6px
    }

    /* 로그인 모달 */
    .login-modal {
      background: #fff;
      border-radius: var(--rl);
      padding: 28px 32px;
      width: 300px;
      text-align: center
    }

    .login-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px
    }

    .login-sub {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 20px
    }

    .login-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px
    }

    .login-field input {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: var(--r);
      border: 1px solid var(--border2);
      font-family: inherit;
      outline: none

        detail: '센서 취부 홀(Hole) 위치가 1.5mm 편차 발생. 억지 조립 시 센서 정밀도 저하 및 브래킷 변형 우려.',
        check: '홀 위치 도면과 대조. 볼트가 자연스럽게 체결되지 않으면 즉시 조립 중단.',
        result: '센서 정밀도 저하 / 브래킷 변형', action: '재가공 후 재납품 진행 중.',
        vendor: 'SE&T', occDate: '2025-04-01', inspDate: '2025-04-02', photos: []
      },
      {
        id: 7, model: 'CVD-3000', cat: '배관류', part: 'O-ring Ø50 NBR', type: '표면불량', grade: 'A', status: 'Close',
        title: 'O-ring 표면 크랙 및 변형',
        detail: 'O-ring 표면에 미세 크랙(Crack) 및 타원 변형 확인. 실링 기능 상실로 리크 직결.',
        check: '강한 조명 아래 O-ring 전체 표면 육안 검사. 크랙, 변형, 이물질 확인. 의심 시 전량 교체.',
        result: '실링 불량 / 리크 직결', action: '해당 로트 전량 교체 완료. Close 처리.',
        vendor: '나우', occDate: '2025-04-10', inspDate: '2025-04-11', photos: []
      }
    ];
    var nextId = 8;
    var editPhotos = [];
    var checkState = {};
    var currentDetailId = null;

    /* ======= 뱃지 ======= */
    function gb(g) {
      return g === 'A' ? '<span class="tag tag-a">A등급</span>' :
        g === 'B' ? '<span class="tag tag-b">B등급</span>' : '<span class="tag tag-c">C등급</span>';
    }
    function sb(s) {
      return s === 'Open' ? '<span class="tag tag-open">Open</span>' : '<span class="tag tag-close">Close</span>';
    }

    /* ======= 탭 ======= */
    function switchTab(t) {
      var tabs = ['search', 'cl', 'admin'];
      document.querySelectorAll('.tab').forEach(function (b, i) { b.classList.toggle('on', tabs[i] === t); });
      tabs.forEach(function (n) {
        var el = document.getElementById('sec-' + n);
        if (el) el.classList.toggle('on', n === t);
      });
      if (t === 'admin') drawAdminList();
    }

    /* ======= 통계 ======= */
    function drawStats(f) {
      var a = f.filter(function (d) { return d.grade === 'A'; }).length;
      var op = f.filter(function (d) { return d.status === 'Open'; }).length;
      var cl = f.filter(function (d) { return d.status === 'Close'; }).length;
      document.getElementById('stat-row').innerHTML =
        '<div class="stat-card"><div class="stat-num">' + f.length + '</div><div class="stat-label">검색 결과</div></div>' +
        '<div class="stat-card"><div class="stat-num" style="color:var(--red-txt)">' + a + '</div><div class="stat-label">A등급 고위험</div></div>' +
        '<div class="stat-card"><div class="stat-num" style="color:#185fa5">' + op + '</div><div class="stat-label">Open 관리 중</div></div>' +
        '<div class="stat-card"><div class="stat-num" style="color:#888">' + cl + '</div><div class="stat-label">Close 이력</div></div>';
      document.getElementById('db-count').textContent = '총 ' + DB.length + '건';
    }

    /* ======= 카드 ======= */
    function drawCards() {
      var kw = document.getElementById('kw').value.toLowerCase();
      var m = document.getElementById('fm').value;
      var c = document.getElementById('fcat').value;
      var t = document.getElementById('ft').value;
      var g = document.getElementById('fg').value;
      var s = document.getElementById('fs').value;
      var f = DB.filter(function (d) {
        if (m && d.model !== m) return false;
        if (c && d.cat !== c) return false;
        if (t && d.type !== t) return false;
        if (g && d.grade !== g) return false;
        if (s && d.status !== s) return false;
        if (kw && !(d.title + d.part + d.detail + d.type).toLowerCase().includes(kw)) return false;
        return true;
      });
      drawStats(f);
      document.getElementById('result-info').textContent = f.length + '건 표시 중';
      var el = document.getElementById('card-grid');
      if (!f.length) { el.innerHTML = '<div class="empty">조건에 맞는 사례가 없습니다.</div>'; return; }
      el.innerHTML = f.map(function (d) {
        var thumb = d.photos && d.photos.length > 0 ?
          '<img src="' + d.photos[0] + '" alt="사진">' :
          '<div style="font-size:22px;opacity:.25">&#128247;</div><span>사진 미등록</span>';
        return '<div class="card' + (d.status === 'Close' ? ' closed' : '') + '" onclick="openDetail(' + d.id + ')">' +
          '<div class="card-img">' + thumb + '</div>' +
          '<div class="tags">' + gb(d.grade) + sb(d.status) + '<span class="tag tag-n">' + d.cat + '</span></div>' +
          '<div class="card-title">' + d.title + '</div>' +
          '<div class="card-sub">' + d.model + ' · ' + d.part + '</div>' +
          '<div class="card-meta">' + d.vendor + ' · ' + d.occDate + '</div>' +
          '</div>';
      }).join('');
    }

    /* ======= 상세 모달 ======= */
    function openDetail(id) {
      var d = DB.find(function (x) { return x.id === id; });
      if (!d) return;
      currentDetailId = id;
      document.getElementById('mh-info').innerHTML =
        '<div class="tags" style="margin-bottom:6px">' + gb(d.grade) + sb(d.status) + '<span class="tag tag-n">' + d.type + '</span><span class="tag tag-n">' + d.cat + '</span></div>' +
        '<div class="modal-head-title">' + d.title + '</div>' +
        '<div class="modal-head-sub">' + d.model + ' · ' + d.part + '</div>';
      var pHTML = '';
      if (d.photos && d.photos.length > 0) {
        pHTML = '<div class="photo-count">' + d.photos.length + '장 — 스크롤하여 확인</div>' +
          '<div class="photo-scroll">' + d.photos.map(function (s, i) {
            return '<img class="photo-item" src="' + s + '" alt="사진' + (i + 1) + '">';
          }).join('') + '</div>';
      } else {
        pHTML = '<div class="photo-scroll"><div class="photo-empty"><div style="font-size:28px;opacity:.2">&#128247;</div>등록된 사진 없음</div></div>';
      }
      var adminHTML = '<div class="admin-ctrl' + (isAdmin ? ' show' : '') + '" id="det-admin">' +
        '<div class="admin-ctrl-title">관리자 — 상태 / 편집</div>' +
        '<div class="ctrl-row">' +
        '<button class="btn-open" onclick="setStatus(' + id + ',\'Open\')">Open</button>' +
        '<button class="btn-close-st" onclick="setStatus(' + id + ',\'Close\')">Close</button>' +
        '<button class="btn-edit" onclick="startEdit(' + id + ')">수정</button>' +
        '<button class="btn-del" onclick="deleteRecord(' + id + ')">삭제</button>' +
        '</div></div>';
      document.getElementById('mb').innerHTML =
        pHTML +
        '<div class="kv"><span class="k">불량 내용</span><span class="v">' + d.detail + '</span></div><div class="sep"></div>' +
        '<div class="kv"><span class="k">확인 방법</span><span class="v v-green">' + d.check + '</span></div><div class="sep"></div>' +
        '<div class="kv"><span class="k">발생 결과</span><span class="v">' + d.result + '</span></div>' +
        '<div class="kv"><span class="k">당시 조치</span><span class="v">' + d.action + '</span></div><div class="sep"></div>' +
        '<div class="kv"><span class="k">발생 협력사</span><span class="v">' + d.vendor + '</span></div>' +
        '<div class="kv"><span class="k">발생일</span><span class="v">' + d.occDate + '</span></div>' +
        '<div class="kv"><span class="k">검사 시작일</span><span class="v">' + d.inspDate + '</span></div>' +
        adminHTML;
      document.getElementById('detail-bg').classList.add('on');
    }
    function closeDetail() { document.getElementById('detail-bg').classList.remove('on'); currentDetailId = null; }

    /* ======= 상태 변경 ======= */
    function setStatus(id, s) {
      var d = DB.find(function (x) { return x.id === id; });
      if (!d) return;
      if (!confirm('[' + d.title + ']\n상태를 "' + s + '"으로 변경하시겠습니까?')) return;
      d.status = s; closeDetail(); drawCards(); drawCL();
    }

    /* ======= 삭제 ======= */
    function deleteRecord(id) {
      var d = DB.find(function (x) { return x.id === id; });
      if (!d) return;
      if (!confirm('[' + d.title + ']\n이 사례를 삭제하시겠습니까?\n삭제 후 파일 저장을 통해 반영하세요.')) return;
      DB = DB.filter(function (x) { return x.id !== id; });
      closeDetail(); drawCards(); drawAdminList(); drawCL();
    }

    /* ======= 사진 붙여넣기 (Ctrl+V) ======= */
    // 페이지 전체에서 붙여넣기 이벤트 감지
    document.addEventListener('paste', function(e) {
      // 붙여넣기 영역이 활성화(포커스)되어 있거나, 폼이 열려있을 때만 동작
      var pasteArea = document.getElementById('paste-area');
      if (!pasteArea) return;

      var items = e.clipboardData && e.clipboardData.items;
      if (!items) return;

      var hasImage = false;
      for (var i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') !== -1) {
          hasImage = true;
          var blob = items[i].getAsFile();
          var reader = new FileReader();
          reader.onload = (function(b) {
            return function(ev) {
              editPhotos.push(ev.target.result);
              renderPhotoPreview();
              // 붙여넣기 성공 시 힌트 텍스트 업데이트
              var hint = document.getElementById('paste-hint');
              if (hint) hint.innerHTML = '✅ 이미지 추가됨 — 추가로 <strong>Ctrl+V</strong> 가능';
            };
          })(blob);
          reader.readAsDataURL(blob);
        }
      }

      if (!hasImage) {
        // 이미지가 아닌 경우 안내
        var hint = document.getElementById('paste-hint');
        if (hint) {
          hint.innerHTML = '⚠️ 이미지가 아닙니다. 캡처 후 Ctrl+V 해주세요';
          setTimeout(function() {
            hint.innerHTML = '이 영역을 클릭 후 <strong>Ctrl+V</strong> 로 이미지를 붙여넣으세요';
          }, 2500);
        }
      }
    });

    // 기존 handlePhotoUpload 는 사용 안 하지만 참조 오류 방지용으로 유지
    function handlePhotoUpload(e) {}
    function renderPhotoPreview() {
      var el = document.getElementById('photo-preview');
      el.innerHTML = editPhotos.map(function (src, i) {
        return '<div class="preview-item">' +
          '<img src="' + src + '">' +
          '<button class="preview-del" onclick="removePhoto(' + i + ')" title="삭제">✕</button>' +
          '</div>';
      }).join('');
    }
    function removePhoto(i) {
      editPhotos.splice(i, 1);
      renderPhotoPreview();
    }

    /* ======= 폼 저장 ======= */
    function saveRecord() {
      var fv = function (id) { return document.getElementById(id).value.trim(); };
      var model = fv('f-model'), cat = fv('f-cat'), part = fv('f-part'), type = fv('f-type'),
        grade = fv('f-grade'), status = fv('f-status'), vendor = fv('f-vendor'),
        occDate = fv('f-occdate'), inspDate = fv('f-inspdate'), title = fv('f-title'),
        detail = fv('f-detail'), check = fv('f-check'), result = fv('f-result'), action = fv('f-action');
      if (!model || !cat || !part || !type || !grade || !vendor || !occDate || !title || !detail || !check) {
        alert('필수 항목(*)을 모두 입력해 주세요.'); return;
      }
      var eid = document.getElementById('edit-id').value;
      if (eid) {
        var d = DB.find(function (x) { return x.id === parseInt(eid); });
        if (d) {
          d.model = model; d.cat = cat; d.part = part; d.type = type; d.grade = grade; d.status = status;
          d.vendor = vendor; d.occDate = occDate; d.inspDate = inspDate; d.title = title;
          d.detail = detail; d.check = check; d.result = result; d.action = action;
          if (editPhotos.length > 0) d.photos = editPhotos;
        }
        alert('수정되었습니다.');
      } else {
        DB.push({
          id: nextId++, model: model, cat: cat, part: part, type: type, grade: grade, status: status,
          title: title, detail: detail, check: check, result: result, action: action,
          vendor: vendor, occDate: occDate, inspDate: inspDate, photos: editPhotos.slice()
        });
        alert('등록되었습니다.');
      }
      resetForm(); drawCards(); drawAdminList(); drawCL();
    }

    /* ======= 수정 시작 ======= */
    function startEdit(id) {
      var d = DB.find(function (x) { return x.id === id; });
      if (!d) return;
      closeDetail();
      switchTab('admin');
      var sv = function (eid, val) { document.getElementById(eid).value = val; };
      sv('edit-id', d.id);
      sv('f-model', d.model); sv('f-cat', d.cat); sv('f-part', d.part); sv('f-type', d.type);
      sv('f-grade', d.grade); sv('f-status', d.status); sv('f-vendor', d.vendor);
      sv('f-occdate', d.occDate); sv('f-inspdate', d.inspDate); sv('f-title', d.title);
      sv('f-detail', d.detail); sv('f-check', d.check); sv('f-result', d.result); sv('f-action', d.action);
      editPhotos = d.photos ? d.photos.slice() : [];
      renderPhotoPreview();
      document.getElementById('form-title').textContent = '사례 수정 — ' + d.title;
      document.getElementById('form-wrap').scrollIntoView({ behavior: 'smooth' });
    }

    /* ======= 폼 초기화 ======= */
    function resetForm() {
      ['f-model', 'f-cat', 'f-part', 'f-type', 'f-grade', 'f-vendor', 'f-occdate', 'f-inspdate', 'f-title', 'f-detail', 'f-check', 'f-result', 'f-action']
        .forEach(function (id) { document.getElementById(id).value = ''; });
      document.getElementById('f-status').value = 'Open';
      document.getElementById('edit-id').value = '';
      editPhotos = [];
      renderPhotoPreview();
      document.getElementById('form-title').textContent = '신규 사례 등록';
    }

    /* ======= 관리자 목록 (필터 + 정렬) ======= */
    var adminFilter = { no:'', cat:'', model:'', title:'', vendor:'', grade:'', status:'' };
    var adminSort   = { key:'id', asc: true };
    var _filterTimer = null;

    // 정렬 화살표 표시
    function arr(key) {
      if (adminSort.key !== key) return '<span class="sort-arrow">⇅</span>';
      return '<span class="sort-arrow">' + (adminSort.asc ? '↑' : '↓') + '</span>';
    }

    // 헤더 클릭 시 정렬
    function sortBy(key) {
      if (adminSort.key === key) adminSort.asc = !adminSort.asc;
      else { adminSort.key = key; adminSort.asc = true; }
      drawAdminList();
    }

    // 필터 입력 시 300ms 디바운스 후 데이터 행만 갱신
    function onFilterInput(field, value) {
      adminFilter[field] = value;
      clearTimeout(_filterTimer);
      _filterTimer = setTimeout(renderDataRows, 300);
    }

    // 필터+정렬 적용된 배열 반환
    function getFiltered() {
      var f = DB.filter(function(d) {
        return (!adminFilter.no     || String(d.id).includes(adminFilter.no)) &&
               (!adminFilter.cat    || (d.cat||'').toLowerCase().includes(adminFilter.cat.toLowerCase())) &&
               (!adminFilter.model  || (d.model||'').toLowerCase().includes(adminFilter.model.toLowerCase())) &&
               (!adminFilter.title  || (d.title||'').toLowerCase().includes(adminFilter.title.toLowerCase())) &&
               (!adminFilter.vendor || (d.vendor||'').toLowerCase().includes(adminFilter.vendor.toLowerCase())) &&
               (!adminFilter.grade  || (d.grade||'').toLowerCase().includes(adminFilter.grade.toLowerCase())) &&
               (!adminFilter.status || (d.status||'').toLowerCase().includes(adminFilter.status.toLowerCase()));
      });
      f.sort(function(a, b) {
        var va = a[adminSort.key] || '', vb = b[adminSort.key] || '';
        return (va < vb ? -1 : va > vb ? 1 : 0) * (adminSort.asc ? 1 : -1);
      });
      return f;
    }

    // 데이터 행만 업데이트 (필터 input 포커스 유지)
    function renderDataRows() {
      var filtered = getFiltered();
      document.getElementById('admin-list-count').textContent =
        '— 씽 ' + DB.length + '건' + (filtered.length < DB.length ? ' (필터: ' + filtered.length + '건)' : '');
      var body = document.getElementById('admin-list-body');
      if (!body) { drawAdminList(); return; }
      body.innerHTML = filtered.length ? filtered.map(function(d) {
        return '<div class="admin-list-row" onclick="startEdit(' + d.id + ')">' +
          '<span class="meta">' + d.id + '</span>' +
          '<span class="meta">' + (d.cat||'-') + '</span>' +
          '<span class="meta">' + (d.model||'-') + '</span>' +
          '<span class="title">' + (d.title||'-') + '</span>' +
          '<span class="meta">' + (d.vendor||'-') + '</span>' +
          '<span>' + gb(d.grade) + '</span>' +
          '<span>' + sb(d.status) + '</span>' +
        '</div>';
      }).join('') : '<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">필터 조건에 맞는 항목이 없습니다.</div>';
    }

    // 전체 목록 그리기 (헤더 + 필터행 + 데이터행)
    // ※ data-key 속성 + 이벤트 위임 방식으로 따옴표 충돌 완전 제거
    function drawAdminList() {
      var el = document.getElementById('admin-list');
      if (!DB.length) {
        el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">등록된 사례가 없습니다.</div>';
        return;
      }

      var keys     = ['id','cat','model','title','vendor','grade','status'];
      var labels   = ['No','Category','Model','Title','발생 협력사','등급','상태'];
      var pholds   = ['No','Category','Model','Title','협력사','등급','상태'];
      var fvals    = [adminFilter.no,adminFilter.cat,adminFilter.model,
                      adminFilter.title,adminFilter.vendor,adminFilter.grade,adminFilter.status];

      // 헤더
      var headHTML = '<div class="admin-list-head">' +
        keys.map(function(k,i){ return '<span data-sk="'+k+'">'+labels[i]+arr(k)+'</span>'; }).join('') +
      '</div>';

      // 필터 행
      var filterHTML = '<div class="admin-filter-row">' +
        keys.map(function(k,i){
          return '<input type="text" id="af-'+k+'" data-fk="'+k+'" placeholder="'+pholds[i]+'" value="'+(fvals[i]||'')+'">';
        }).join('') +
      '</div>';

      el.innerHTML = headHTML + filterHTML + '<div id="admin-list-body"></div>';

      // 헤더 클릭 → 정렬 (이벤트 위임)
      el.querySelector('.admin-list-head').addEventListener('click', function(e) {
        var t = e.target.closest('[data-sk]');
        if (t) sortBy(t.getAttribute('data-sk'));
      });

      // 필터 입력 → 디바운스 (이벤트 위임)
      el.querySelector('.admin-filter-row').addEventListener('input', function(e) {
        var inp = e.target;
        if (inp.dataset.fk) onFilterInput(inp.dataset.fk, inp.value);
      });

      renderDataRows();
    }

    // 필터 초기화
    function clearAdminFilter() {
      adminFilter = { no:'', cat:'', model:'', title:'', vendor:'', grade:'', status:'' };
      adminSort   = { key:'id', asc: true };
      drawAdminList();
    }

    /* ======= 체크리스트 ======= */
    function drawCL() {
      var m = document.getElementById('cl-model').value;
      var c = document.getElementById('cl-cat').value;
      var pw = document.getElementById('cl-prog-wrap');
      var sign = document.getElementById('cl-sign');
      var list = document.getElementById('cl-list');
      // 모델 미선택 시에만 안내 표시 (카테고리는 선택 사항)
      if (!m) {
        list.innerHTML = '<div class="empty">모델을 선택하면<br>해당 주의 항목이 표시됩니다.</div>';
        pw.style.display = 'none'; sign.style.display = 'none'; return;
      }
      // 모델만 선택 시 전체 표시, 카테고리 선택 시 추가 필터
      var items = DB.filter(function (d) {
        return d.model === m && d.status === 'Open' && (!c || d.cat === c);
      });
      if (!items.length) {
        list.innerHTML = '<div class="empty">해당 조합의 Open 불량 사례가 없습니다.<br><span style="font-size:12px;color:var(--green)">안전하게 조립을 진행하세요.</span></div>';
        pw.style.display = 'none'; sign.style.display = 'none'; return;
      }
      pw.style.display = 'block';
      list.innerHTML = items.map(function (d) {
        var done = !!checkState[d.id];
        return '<div class="ci' + (done ? ' done' : '') + '" id="ci-' + d.id + '" onclick="togCL(' + d.id + ')">' +
          '<input type="checkbox"' + (done ? ' checked' : '') + ' onclick="event.stopPropagation();togCL(' + d.id + ')">' +
          '<div class="ci-body">' +
          '<div class="ci-top">' + gb(d.grade) + '<span class="ci-title">' + d.title + '</span></div>' +
          '<div class="ci-check">확인: ' + d.check + '</div>' +
          '</div>' +
          '<button class="btn-detail" onclick="event.stopPropagation();openDetail(' + d.id + ')">상세보기</button>' +
          '</div>';
      }).join('');
      updProg(items);
    }
    function togCL(id) {
      checkState[id] = !checkState[id];
      var m = document.getElementById('cl-model').value;
      var c = document.getElementById('cl-cat').value;
      var items = DB.filter(function (d) {
        return d.model === m && d.status === 'Open' && (!c || d.cat === c);
      });
      var el = document.getElementById('ci-' + id);
      if (el) { el.classList.toggle('done', !!checkState[id]); el.querySelector('input').checked = !!checkState[id]; }
      updProg(items);
    }
    function updProg(items) {
      var done = items.filter(function (d) { return checkState[d.id]; }).length;
      var total = items.length;
      document.getElementById('prog-txt').textContent = done + ' / ' + total;
      document.getElementById('pfill').style.width = Math.round(done / total * 100) + '%';
      document.getElementById('cl-sign').style.display = (done === total && total > 0) ? 'block' : 'none';
    }
    function resetCL() {
      Object.keys(checkState).forEach(function (k) { delete checkState[k]; });
      drawCL();
    }
    function submitSign() {
      var name = document.getElementById('sign-name').value.trim();
      if (!name) { alert('작업자 이름을 입력해 주세요.'); return; }
      var now = new Date();
      var ts = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0') +
        ' ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
      alert('[ 확인 완료 ]\n작업자: ' + name + '\n시각: ' + ts + '\n\n조립을 착수해 주세요.');
    }

    /* ======= 파일로 저장 ======= */
    function saveAsFile() {
      var dbJSON = JSON.stringify(DB, null, 2);
      var html = document.documentElement.outerHTML;
      var marker = 'var DB=[';
      var start = html.indexOf(marker);
      if (start === -1) { alert('저장 오류: DB 위치를 찾을 수 없습니다.'); return; }
      var depth = 0, end = start + marker.length - 1;
      for (var i = start + marker.length - 1; i < html.length; i++) {
        if (html[i] === '[') depth++;
        else if (html[i] === ']') { depth--; if (depth === 0) { end = i; break; } }
      }
      var newHtml = html.substring(0, start) + 'var DB=' + dbJSON + html.substring(end + 1);
      var blob = new Blob([newHtml], { type: 'text/html;charset=utf-8' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      var today = new Date();
      var ds = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
      a.download = ds + '_외관불량_실패DB_v3.html';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    /* ======= 공통 ======= */
    function bgClick(e, id) {
      if (e.target === document.getElementById(id)) {
        if (id === 'detail-bg') closeDetail();
        else if (id === 'login-bg') closeLogin();
      }
    }

    /* ======= 이벤트 바인딩 ======= */
    ['kw', 'fm', 'fcat', 'ft', 'fg', 'fs'].forEach(function (id) {
      document.getElementById(id).addEventListener(id === 'kw' ? 'input' : 'change', drawCards);
    });
    ['cl-model', 'cl-cat'].forEach(function (id) {
      document.getElementById(id).addEventListener('change', function () {
        Object.keys(checkState).forEach(function (k) { delete checkState[k]; });
        drawCL();
      });
    });

    /* ======= 초기화 ======= */
    drawCards(); drawCL();
  </script>
</body>

</html>
